<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>GAC Counters</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <button id="menuToggle" class="hamburger">☰</button>
  <h1>GAC Counters</h1>
</header>

<div class="app-layout">

  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <aside id="sidebar" class="sidebar">

    <div class="sidebar-title">Menu</div>

    <div class="sidebar-nav">
      <button id="navCounters" class="nav-btn active">Counters</button>
      <button id="navMyTeams" class="nav-btn">My Teams</button>
      <button id="navAnalytics" class="nav-btn">Analytics</button>
    </div>

  </aside>

  <!-- ============================================================
       MAIN CONTENT
       ============================================================ -->
  <main class="main-content">

    <!-- ============================================================
         COUNTERS SECTION
         ============================================================ -->
    <section id="countersSection" class="fade-section visible">

      <h2>Counters</h2>

      <div class="controls">

        <label>
          Search enemy lead:
          <div class="search-wrapper">
            <input id="searchInput" type="text" placeholder="e.g. Jabba">
            <span id="resetFilterBtn" class="reset-icon">✖</span>
            <div id="autocompleteList" class="autocomplete-list"></div>
          </div>
        </label>

        <label>
          Tier:
          <select id="tierFilter">
            <option value="">All</option>
            <option value="S">S</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </label>

        <label>
          Type:
          <select id="typeFilter">
            <option value="">All</option>
            <option value="GL">GL</option>
            <option value="Non-GL">Non-GL</option>
          </select>
        </label>

      </div>

      <div class="summary">
        <div class="card">
          <h3>GL Counters</h3>
          <div id="glCounters" class="gl-grid"></div>
        </div>
      </div>

      <div class="table-section">
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Enemy Lead</th>
              <th>My Lead</th>
              <th>Winrate</th>
              <th>Tier</th>
              <th>Attempts</th>
            </tr>
          </thead>
          <tbody id="matchupTableBody"></tbody>
        </table>

        <div id="pagination" class="pagination"></div>
      </div>

      <div id="detailPanel" class="detail-section"></div>

    </section>

    <!-- ============================================================
         ANALYTICS SECTION
         ============================================================ -->
    <section id="analyticsSection" class="fade-section">
      <h2>Analytics</h2>

      <div class="analytics-grid">
        <div class="analytics-card">
          <div class="analytics-placeholder">Analytics content will go here…</div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         MY TEAMS SECTION (NEW)
         ============================================================ -->
    <section id="myTeamsSection" class="fade-section">
      <h2>My Teams</h2>
      <div id="myTeamsGrid" class="teams-grid"></div>
    </section>

    <footer>
      GAC Counters © 2025
    </footer>

  </main>
</div>

<div id="tooltip" class="tooltip"></div>

<script src="app.js"></script>
<div id="teamOverlay" class="team-overlay">
  <div class="team-overlay-close">✖</div>
  <img id="teamOverlayImg" src="">
</div>
</body>
</html>
