<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vito's GAC counters DB</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Vito's GAC counters DB</h1>

    <div class="controls">

      <!-- SEARCH -->
      <div class="search-wrapper">
        <label for="searchInput">Search:</label>
        <input type="text" id="searchInput" placeholder="Enemy lead, My lead,.." />
        <span id="resetFilterBtn" class="reset-icon" title="Reset filtru">⟲</span>

        <div id="autocompleteList" class="autocomplete-list"></div>
      </div>

      <!-- TIER FILTER -->
      <label>
        Tier:
        <select id="tierFilter">
          <option value="">All</option>
          <option value="S">S</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </label>

      <!-- TYPE FILTER -->
      <label>
        Typ:
        <select id="typeFilter">
          <option value="">All</option>
          <option value="ground">Ground</option>
          <option value="ship">Ship</option>
          <option value="cleanup">Cleanup</option>
        </select>
      </label>

    </div>
  </header>

  <main>

    <!-- GL COUNTERS -->
    <section class="summary">
      <div class="card collapsible-card">
        <h2 class="collapsible-header">
          GL counters
          <span class="collapse-icon">▶</span>
        </h2>

        <div class="collapsible-content">
          <div id="glCounters" class="gl-grid"></div>
        </div>
      </div>
    </section>

    <!-- MATCHUPS TABLE -->
    <section class="table-section">
      <h2>Matchups</h2>

      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Enemy lead</th>
            <th>My lead</th>
            <th>Winrate</th>
            <th>Tier</th>
            <th>Attempts</th>
          </tr>
        </thead>
        <tbody id="matchupTableBody"></tbody>
      </table>

      <div id="pagination" class="pagination"></div>
    </section>

    <!-- DETAIL PANEL -->
    <section class="detail-section">
      <h2>Counter detail</h2>
      <div id="detailPanel">
        <p>Choose a counter for detail</p>
      </div>
    </section>

  </main>

  <footer>
    <small>Vito's GAC counters DB</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
